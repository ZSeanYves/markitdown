name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 6"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  HOMEBREW_NO_AUTO_UPDATE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  TZ: "UTC"
  LANG: "en_US.UTF-8"
  LC_ALL: "en_US.UTF-8"
  PYTHONHASHSEED: "0"
  OMP_NUM_THREADS: "1"
  MKL_NUM_THREADS: "1"
  OPENBLAS_NUM_THREADS: "1"
  VECLIB_MAXIMUM_THREADS: "1"
  NUMEXPR_NUM_THREADS: "1"
  MARKITDOWN_QUALITY_LAB_SHA: "cc51a36346e099cdb02f18e63d579577afd4a3dc"

jobs:
  core:
    name: MoonBit core (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - run: moon update
      - name: Format
        run: moon fmt --check
      - name: Interfaces
        run: moon info && git diff --exit-code
      - name: Check
        run: moon check --target all --warn-list +73 --deny-warn
      - name: Test
        run: moon test --target all

  tooling:
    name: Python and shell tools
    needs: core
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Shell syntax
        run: find tools -type f -name '*.sh' -print0 | xargs -0 bash -n
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          scandir: ./tools
          check_together: true
      - name: Python syntax and tests
        run: |
          python3 -m py_compile $(find tools -type f -name '*.py' -print)
          python3 -m unittest discover -s tools/env/lib/tests -p 'test_*.py'
          python3 -m unittest discover -s tools/regression/lib/tests -p 'test_*.py'
  coverage:
    name: Coverage
    needs: [core, tooling]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - run: moon update
      - name: Run coverage gate
        env:
          MARKITDOWN_COVERAGE_BASELINE_REF: ${{ github.event.pull_request.base.sha || github.event.before || 'HEAD^' }}
        run: |
          ./tools/regression/run_with_release_manifest.sh \
            --output .tmp/release/coverage.json \
            --artifact .tmp/coverage \
            -- ./tools/regression/check_coverage.sh --enforce
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage
          path: |
            .tmp/coverage
            .tmp/release/coverage.json
          if-no-files-found: error

  regression:
    name: ${{ matrix.name }}
    needs: [core, tooling]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Main regression (Linux)
            os: ubuntu-24.04
            profiles: balance
            command: check_balance.sh
            evidence: check
            audio_mode: mock
          - name: Main regression (macOS)
            os: macos-15
            profiles: balance
            command: check_balance.sh
            evidence: check
            audio_mode: mock
          - name: Quality regression
            os: ubuntu-24.04
            profiles: balance audio
            command: check_balance_quality.sh
            evidence: quality
            audio_mode: real
          - name: Accurate regression
            os: ubuntu-24.04
            profiles: accurate
            command: check_accurate.sh
            evidence: accurate
            audio_mode: mock
    env:
      MARKITDOWN_CLI: ${{ github.workspace }}/_build/native/debug/build/cli/cli.exe
      MARKITDOWN_BALANCE_AUDIO_RUNTIME: ${{ matrix.audio_mode }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: ZSeanYves/markitdown-quality-lab
          path: markitdown-quality-lab
          ref: ${{ env.MARKITDOWN_QUALITY_LAB_SHA }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - run: moon update
      - name: Build CLI
        run: moon build cli --target native
      - name: Install optional dependencies
        run: |
          for profile in ${{ matrix.profiles }}; do
            ./tools/env/optional_deps.sh install "$profile"
            ./tools/env/optional_deps.sh check "$profile"
          done
      - name: Run regression
        run: |
          ./tools/regression/run_with_release_manifest.sh \
            --output .tmp/release/${{ matrix.evidence }}.json \
            --artifact .tmp/${{ matrix.evidence }} \
            -- ./tools/regression/${{ matrix.command }}
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: regression-${{ matrix.evidence }}-${{ matrix.os }}
          path: |
            .tmp/${{ matrix.evidence }}
            .tmp/release/${{ matrix.evidence }}.json
          if-no-files-found: error

  benchmark:
    name: Performance
    needs: [core, tooling]
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: ZSeanYves/markitdown-quality-lab
          path: markitdown-quality-lab
          ref: ${{ env.MARKITDOWN_QUALITY_LAB_SHA }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - run: moon update
      - name: Install benchmark baseline
        run: ./tools/env/optional_deps.sh install bench
      - name: Build benchmark
        run: |
          moon build --target native --release --package ZSeanYves/markitdown/cli
          moon build --target native --release --package ZSeanYves/markitdown/bench/runner
      - name: Doctor
        run: _build/native/release/build/bench/runner/runner.exe doctor
      - name: Run benchmark
        run: |
          set -euo pipefail
          mkdir -p .tmp/bench-ci
          disk=512
          args=(--preset change-risk)
          if [[ "${{ github.event_name }}" == schedule ]]; then
            disk=4096
            args=(--preset official-external-compare)
            python3 tools/regression/mutation_smoke.py
          fi
          _build/native/release/build/bench/runner/runner.exe run \
            "${args[@]}" \
            --progress=json --keep-outputs=failures --max-disk-mb "$disk" \
            | tee .tmp/bench-ci/run.jsonl
          summary="$(tail -n 1 .tmp/bench-ci/run.jsonl | jq -er '.summary_json | select(type == "string" and length > 0)')"
          test -f "$summary"
          jq -e '
            .trust_status == "trusted" and
            .truth_summary.failed_cases == 0 and
            .gate_summary.rss.status == "pass" and
            (
              .gate_summary.performance.status == "pass" or
              (.preset == "change-risk" and .gate_summary.performance.status == "not_applicable")
            )
          ' "$summary"
          cp "$summary" .tmp/bench-ci/summary.json
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark
          path: |
            .tmp/bench-ci
            .tmp/bench/runs
            .tmp/mutation
          if-no-files-found: ignore
