name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Show MoonBit version
        run: |
          moon version || true
          moonc -v || true

      - name: Update MoonBit registry
        run: moon update

      - name: Build native CLI
        run: moon build --target native

      - name: Check
        run: moon check

      - name: Test
        run: moon test

      - name: Install sample validation OCR dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils tesseract-ocr tesseract-ocr-eng

      - name: Install sample validation OCR dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install poppler tesseract

      - name: Sample validation
        run: ./samples/check.sh
