name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  MOONBIT_VERSION: 0.1.20260703

jobs:
  core-validate:
    name: core-validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash -s -- "$MOONBIT_VERSION"
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Show MoonBit version
        run: |
          moon version || true
          moonc -v || true

      - name: Update MoonBit registry
        run: moon update

      - name: Check generated interfaces
        run: |
          moon info
          git diff --exit-code

      - name: Check formatting
        run: moon fmt --check

      - name: Check
        run: moon check

      - name: Test
        run: moon test

  external-main-regression:
    name: external-main-regression (${{ matrix.os }})
    needs: core-validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Checkout quality lab
        uses: actions/checkout@v5
        with:
          repository: ZSeanYves/markitdown-quality-lab
          path: markitdown-quality-lab

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash -s -- "$MOONBIT_VERSION"
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Update MoonBit registry
        run: moon update

      - name: Build native CLI
        run: moon build --target native

      - name: Install OCR dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils tesseract-ocr tesseract-ocr-eng

      - name: Install OCR dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install poppler tesseract

      - name: External main regression
        run: ./samples/check.sh

  external-quality-regression:
    name: external-quality-regression
    needs: core-validate
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Checkout quality lab
        uses: actions/checkout@v5
        with:
          repository: ZSeanYves/markitdown-quality-lab
          path: markitdown-quality-lab

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash -s -- "$MOONBIT_VERSION"
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Update MoonBit registry
        run: moon update

      - name: Build native CLI
        run: moon build --target native

      - name: Install OCR dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils tesseract-ocr tesseract-ocr-eng

      - name: External quality regression
        run: ./samples/check_quality.sh

      - name: Show quality failure summary
        if: failure()
        run: |
          find .tmp/quality -path '*/reports/nonpass.md' -print -exec sh -c 'echo; echo "===== $1 ====="; sed -n "1,160p" "$1"' _ {} \;
          find .tmp/quality -path '*/reports/rows/*.md' -print | head -n 5 | while read -r report; do
            echo
            echo "===== $report ====="
            sed -n '1,160p' "$report"
          done
          find .tmp/quality -path '*/logs/entrypoint.log' -print -exec sh -c 'echo; echo "===== $1 ====="; tail -n 120 "$1"' _ {} \;

      - name: Upload quality run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-quality-regression-artifacts
          path: .tmp/quality
          if-no-files-found: ignore
