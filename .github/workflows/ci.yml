name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  HOMEBREW_NO_AUTO_UPDATE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"
  TZ: "UTC"
  LANG: "en_US.UTF-8"
  LC_ALL: "en_US.UTF-8"
  PYTHONHASHSEED: "0"
  OMP_NUM_THREADS: "1"
  MKL_NUM_THREADS: "1"
  OPENBLAS_NUM_THREADS: "1"
  VECLIB_MAXIMUM_THREADS: "1"
  NUMEXPR_NUM_THREADS: "1"
  MARKITDOWN_QUALITY_LAB_SHA: "3a7fa4cfda5cded851118af19323c89a158e2f98"

jobs:
  core-validate:
    name: core-validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Update MoonBit registry
        run: moon update

      - name: Check env shell syntax
        run: |
          find tools/env tools/regression -type f -name '*.sh' -print0 | xargs -0 bash -n

      - name: Check env Python syntax
        run: |
          python3 -m py_compile $(find tools/env/lib tools/env/wrappers tools/regression/lib -type f -name '*.py' -print)

      - name: Run env unit tests
        run: python3 -m unittest discover -s tools/env/lib/tests -p 'test_*.py'

      - name: Check generated interfaces
        run: |
          moon info
          git diff --exit-code

      - name: Check formatting
        run: moon fmt --check

      - name: Check
        run: moon check

      - name: Test
        run: moon test

  external-main-regression:
    name: external-main-regression (${{ matrix.os }})
    needs: core-validate
    runs-on: ${{ matrix.os }}
    env:
      MARKITDOWN_BALANCE_AUDIO_RUNTIME: mock
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Checkout quality lab
        uses: actions/checkout@v5
        with:
          repository: ZSeanYves/markitdown-quality-lab
          path: markitdown-quality-lab
          ref: ${{ env.MARKITDOWN_QUALITY_LAB_SHA }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Update MoonBit registry
        run: moon update

      - name: Build native CLI
        run: moon build cli --target native

      - name: Install balance image OCR dependencies
        run: ./tools/env/install_ocr_balance_deps.sh

      - name: Install audio dependencies
        run: ./tools/env/install_audio_deps.sh

      - name: Verify managed balance/audio env state
        run: |
          ./tools/env/install_ocr_balance_deps.sh --check
          ./tools/env/install_audio_deps.sh --check

      - name: External main regression
        run: ./tools/regression/check_balance.sh

  external-quality-regression:
    name: external-quality-regression
    needs: core-validate
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Checkout quality lab
        uses: actions/checkout@v5
        with:
          repository: ZSeanYves/markitdown-quality-lab
          path: markitdown-quality-lab
          ref: ${{ env.MARKITDOWN_QUALITY_LAB_SHA }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            tools/env/install_audio_deps.sh
            tools/env/share/install_audio_vosk_model.sh
            tools/env/share/install_runtime_deps_common.sh
            tools/env/lib/common.sh
            tools/env/lib/**/*.py
            tools/env/config/**/*.json
            tools/env/config/python/audio.lock

      - name: Restore Vosk model cache
        uses: actions/cache@v4
        with:
          path: |
            env/downloads/models/vosk
            env/models/vosk
          key: ${{ runner.os }}-vosk-${{ hashFiles('tools/env/install_audio_deps.sh', 'tools/env/share/install_audio_vosk_model.sh', 'tools/env/lib/**/*.py', 'tools/env/config/models.json', 'tools/env/config/profiles.json') }}

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Update MoonBit registry
        run: moon update

      - name: Build native CLI
        run: moon build cli --target native

      - name: Install balance image OCR dependencies
        run: ./tools/env/install_ocr_balance_deps.sh

      - name: Install audio dependencies
        run: ./tools/env/install_audio_deps.sh

      - name: Verify managed balance/audio env state
        run: |
          ./tools/env/install_ocr_balance_deps.sh --check
          ./tools/env/install_audio_deps.sh --check

      - name: External quality regression
        run: ./tools/regression/check_balance_quality.sh

      - name: Show quality failure summary
        if: failure()
        run: |
          find .tmp/quality -path '*/reports/nonpass.md' -print -exec sh -c 'echo; echo "===== $1 ====="; sed -n "1,160p" "$1"' _ {} \;
          find .tmp/quality -path '*/reports/rows/*.md' -print | head -n 5 | while read -r report; do
            echo
            echo "===== $report ====="
            sed -n '1,160p' "$report"
          done
          find .tmp/quality -path '*/logs/entrypoint.log' -print -exec sh -c 'echo; echo "===== $1 ====="; tail -n 120 "$1"' _ {} \;

      - name: Upload quality run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-quality-regression-artifacts
          path: .tmp/quality
          if-no-files-found: ignore

  external-accurate-regression:
    name: external-accurate-regression
    needs: core-validate
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Checkout quality lab
        uses: actions/checkout@v5
        with:
          repository: ZSeanYves/markitdown-quality-lab
          path: markitdown-quality-lab
          ref: ${{ env.MARKITDOWN_QUALITY_LAB_SHA }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            tools/env/install_ocr_pdf_accurate_deps.sh
            tools/env/wrappers/paddle_ocr_wrapper.py
            tools/env/share/install_runtime_deps_common.sh
            tools/env/lib/common.sh
            tools/env/lib/**/*.py
            tools/env/config/**/*.json
            tools/env/config/python/accurate.lock

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Update MoonBit registry
        run: moon update

      - name: Build native CLI
        run: moon build cli --target native

      - name: Install accurate OCR/PDF dependencies
        run: ./tools/env/install_ocr_pdf_accurate_deps.sh

      - name: Verify managed accurate env state
        run: ./tools/env/install_ocr_pdf_accurate_deps.sh --check

      - name: External accurate regression
        run: ./tools/regression/check_accurate.sh

      - name: Show accurate failure summary
        if: failure()
        run: |
          find .tmp/accurate -path '*/summary.md' -print -exec sh -c 'echo; echo "===== $1 ====="; sed -n "1,200p" "$1"' _ {} \;
          find .tmp/accurate -path '*/reports/nonpass.md' -print -exec sh -c 'echo; echo "===== $1 ====="; sed -n "1,200p" "$1"' _ {} \;
          find .tmp/accurate -path '*/reports/rows/*.md' -print | head -n 8 | while read -r report; do
            echo
            echo "===== $report ====="
            sed -n '1,200p' "$report"
          done
          find .tmp/accurate -path '*/logs/*.log' -print | while read -r log; do
            echo
            echo "===== $log ====="
            tail -n 160 "$log"
          done

      - name: Upload accurate run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-accurate-regression-artifacts
          path: .tmp/accurate
          if-no-files-found: ignore
