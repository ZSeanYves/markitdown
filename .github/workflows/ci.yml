name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Show MoonBit version
        run: |
          moon version || true
          moonc -v || true

      - name: Update MoonBit registry
        run: moon update

      - name: Build native CLI
        run: moon build --target native

      - name: Check
        run: moon check

      - name: Test
        run: moon test

      - name: Sample validation
        run: ./samples/check.sh

  bench-smoke:
    name: bench smoke (manual ubuntu)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Show MoonBit version
        run: |
          moon version || true
          moonc -v || true

      - name: Update MoonBit registry
        run: moon update

      - name: Build native CLI
        run: moon build --target native

      - name: Benchmark smoke
        run: ./samples/scripts/bench_smoke.sh --kind smoke
